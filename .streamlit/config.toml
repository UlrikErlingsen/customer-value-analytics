[browser]
gatherUsageStats = false

[server]
# Maximum upload size in MB (matches the app's own 200 MB parsing limit).
# Raise both this and CVA_MAX_UPLOAD_MB deliberately if your customer files
# are bigger; available memory is the real limit.
maxUploadSize = 200
headless = true
fileWatcherType = "none"

[theme]
base = "light"
primaryColor = "#D95B40"
backgroundColor = "#F8F5ED"
secondaryBackgroundColor = "#E7EFE9"
textColor = "#17322E"
font = "sans serif"
