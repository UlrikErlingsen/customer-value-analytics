[browser]
gatherUsageStats = false

[server]
# Maximum upload size in MB (Streamlit's default is 200). Raise it further if
# your customer files are bigger; available memory is the real limit.
maxUploadSize = 1024
headless = true
fileWatcherType = "none"

[theme]
base = "light"
primaryColor = "#D95B40"
backgroundColor = "#F8F5ED"
secondaryBackgroundColor = "#E7EFE9"
textColor = "#17322E"
font = "sans serif"
